name: CI Hardening

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Copy Scan
        run: npm run copy:scan
        
      - name: Release Checklist
        run: npm run release:check
        
      - name: Type Check
        run: npm run typecheck
        
      - name: Unit Tests
        run: npm run test
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        
      - name: E2E Tests
        run: npm run test:e2e
        
      - name: Build
        run: npm run build
